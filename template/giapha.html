<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Quản lý thành viên</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container py-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Quản lý thành viên</h4>
    <a class="btn btn-outline-secondary btn-sm" href="/members">Làm mới</a>
  </div>

  <!-- FORM: tạo/sửa -->
  <form method="post" action="/members/store" enctype="multipart/form-data" class="row g-3 mb-4">
    <!-- Laravel: @csrf -->
    <!-- Nếu edit: action="/members/{id}/update" + hidden input id -->

    <div class="col-md-2">
      <label class="form-label">Đời *</label>
      <input type="number" name="gen" class="form-control" required>
    </div>

    <div class="col-md-5">
      <label class="form-label">Họ tên *</label>
      <input type="text" name="name" class="form-control" required>
    </div>

    <div class="col-md-5">
      <label class="form-label">Chi/Nhánh</label>
      <input type="text" name="branch" class="form-control">
    </div>

    <div class="col-md-3">
      <label class="form-label">Năm sinh</label>
      <input type="number" name="birth" class="form-control">
    </div>

    <div class="col-md-3">
      <label class="form-label">Năm mất</label>
      <input type="number" name="death" class="form-control">
    </div>

    <div class="col-md-6">
      <label class="form-label">Vợ/Chồng</label>
      <input type="text" name="spouse" class="form-control">
    </div>

    <div class="col-md-6">
      <label class="form-label">Hình đại diện (tuỳ chọn)</label>
      <input type="file" name="avatar" class="form-control" accept="image/*">
      <div class="form-text">Backend nên giới hạn: jpg/png/webp, max 2MB.</div>
    </div>

    <div class="col-md-6">
      <label class="form-label">Cha (ID)</label>
      <input type="text" name="father_id" class="form-control">
    </div>

    <div class="col-12">
      <label class="form-label">Ghi chú</label>
      <textarea name="note" class="form-control" rows="2"></textarea>
    </div>

    <div class="col-12">
      <button class="btn btn-primary">Lưu</button>
      <button type="reset" class="btn btn-outline-secondary">Reset</button>
    </div>
  </form>

  <!-- SEARCH: tìm kiếm danh sách -->
  <form method="get" action="/members" class="row g-2 align-items-end mb-3">
    <div class="col-sm-8 col-md-6">
      <label class="form-label">Tìm kiếm</label>
      <input type="text" name="q" class="form-control" placeholder="Tên / chi / đời / ghi chú...">
      <!-- Backend: set lại value="{{ request('q') }}" -->
    </div>
    <div class="col-sm-4 col-md-2">
      <button class="btn btn-outline-primary w-100">Tìm</button>
    </div>
  </form>

  <!-- TABLE -->
  <div class="table-responsive">
    <table class="table table-bordered table-sm align-middle">
      <thead class="table-light">
        <tr>
          <th width="70">ID</th>
          <th width="70">Đời</th>
          <th width="70">Ảnh</th>
          <th>Họ tên</th>
          <th width="200">Thao tác</th>
        </tr>
      </thead>
      <tbody>
        <!-- Backend loop -->
        <tr>
          <td>102</td>
          <td>2</td>
          <td>
            <!-- Nếu có ảnh: -->
            <img src="/uploads/avatars/102.jpg" alt="avatar" width="40" height="40" class="rounded object-fit-cover">
            <!-- Nếu không có ảnh: để trống hoặc icon -->
          </td>
          <td>Nguyễn Văn C</td>
          <td>
            <a class="btn btn-sm btn-outline-primary" href="/members/102/edit">Sửa</a>
            <form method="post" action="/members/102/delete" class="d-inline">
              <!-- Laravel: @csrf -->
              <button class="btn btn-sm btn-outline-danger">Xoá</button>
            </form>
          </td>
        </tr>

        <tr>
          <td>103</td>
          <td>3</td>
          <td></td>
          <td>Nguyễn Văn G</td>
          <td>
            <a class="btn btn-sm btn-outline-primary" href="/members/103/edit">Sửa</a>
            <form method="post" action="/members/103/delete" class="d-inline">
              <button class="btn btn-sm btn-outline-danger">Xoá</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
</body>
</html>
