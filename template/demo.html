<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EduKids Tây Nguyên — Gia sư Tin học</title>
  <meta name="description" content="Gia sư Tin học 1-1 cho học sinh & người đi làm: Tin học văn phòng, Scratch, Python cơ bản. Học online / tại Buôn Ma Thuột." />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
    :root{
      --brand:#2563eb;       /* xanh */
      --brand2:#16a34a;      /* xanh lá */
      --ink:#0f172a;
    }
    body{ color:var(--ink); }
    .navbar{ backdrop-filter:saturate(180%) blur(10px); }
    .hero{
      background:
        radial-gradient(1200px 600px at 20% 10%, rgba(37,99,235,.20), transparent 55%),
        radial-gradient(900px 500px at 80% 30%, rgba(22,163,74,.18), transparent 60%),
        linear-gradient(180deg, #ffffff, #f8fafc);
    }
    .badge-soft{
              background: rgba(37,99,235,.10);
      color: var(--brand);
      border: 1px solid rgba(37,99,235,.20);
    }
    .icon-dot{
      width: 10px; height:10px; border-radius:999px; background:var(--brand);
      display:inline-block; margin-right:.5rem; transform:translateY(-1px);
    }
    .card-hover{ transition: .2s ease; }
    .card-hover:hover{ transform: translateY(-2px); box-shadow: 0 10px 30px rgba(15,23,42,.08); }
    .section{ padding: 72px 0; }
    .section-sm{ padding: 48px 0; }
    .btn-brand{ background:var(--brand); border-color:var(--brand); }
    .btn-brand:hover{ filter:brightness(.95); }
    .btn-outline-brand{ border-color:rgba(37,99,235,.35); color:var(--brand); }
